<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configuration widget — Nova Stream</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
  <div data-dash-main class="dash-main widget-config-page">
    <header class="widget-config-header">
      <div>
        <h1 id="widget-title">Widget</h1>
        <p id="widget-desc" class="widget-config-desc"></p>
      </div>
    </header>

    <section class="module-url-card">
      <h3>URL du module</h3>
      <p class="module-url-hint">
        Ajoutez cette URL comme <strong>source Navigateur</strong> dans OBS ou Nova Stream.
        Liez d'abord votre compte à l'app pour activer les tests en direct.
      </p>
      <label class="module-url-field">
        <span>URL locale (Nova Stream ouvert)</span>
        <div class="module-url-row">
          <input type="text" id="url-local" readonly />
          <button type="button" class="module-url-btn" id="btn-copy-local" title="Copier">📋</button>
          <button type="button" class="module-url-btn" id="btn-open-local" title="Lancer">↗</button>
        </div>
      </label>
      <label class="module-url-field">
        <span>URL web (OBS / autre logiciel)</span>
        <div class="module-url-row">
          <input type="text" id="url-web" readonly />
          <button type="button" class="module-url-btn" id="btn-copy-web" title="Copier">📋</button>
          <button type="button" class="module-url-btn" id="btn-open-web" title="Lancer">↗</button>
        </div>
      </label>
      <div class="module-url-actions">
        <button type="button" class="btn btn-outline btn-sm" id="btn-preview">▶ Aperçu local</button>
        <button type="button" class="btn btn-twitch btn-sm" id="btn-test-app">Test dans l'app</button>
      </div>
      <div id="test-msg" class="test-msg" style="display:none"></div>
    </section>

    <div id="alert-type-tabs" class="cfg-tabs" style="display:none"></div>

    <div class="widget-config-grid">
      <section class="widget-config-panel">
        <h2 class="panel-title">Paramètres</h2>
        <form id="widget-form" class="widget-form" onsubmit="return false"></form>
      </section>

      <section class="widget-config-preview">
        <div class="preview-header">
          <h2 class="panel-title">Aperçu</h2>
          <span class="preview-badge">Live preview</span>
        </div>
        <div class="preview-canvas">
          <div id="widget-preview" class="widget-preview-stage"></div>
        </div>
        <p class="preview-hint">Même rendu que dans vos scènes Nova Stream.</p>
      </section>
    </div>

    <footer class="widget-config-footer">
      <div id="save-msg" class="save-msg" style="display:none"></div>
      <button type="button" class="btn btn-primary" id="btn-save">Enregistrer les paramètres</button>
    </footer>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/link.js"></script>
  <script src="js/widget-settings.js"></script>
  <script src="js/dashboard-shell.js"></script>
  <script src="js/widget-editor.js"></script>
</body>
</html>
