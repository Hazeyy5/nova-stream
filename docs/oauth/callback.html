<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Connexion Twitch — Nova Stream</title>
  <link rel="icon" type="image/png" href="../favicon.png" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .loading { text-align:center; padding:120px 24px; }
    .loading h2 { color:var(--accent); margin-bottom:12px; }
    .loading p { color:var(--text-muted); }
  </style>
</head>
<body>
  <div class="loading">
    <h2>Connexion en cours...</h2>
    <p>Redirection vers votre tableau de bord</p>
  </div>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    NovaAuth.handleOAuthCallback().catch((err) => {
      document.querySelector('.loading').innerHTML =
        `<h2 style="color:#ff4d6a">Erreur</h2><p>${err.message}</p>
         <a href="${NovaAuth.asset('/index.html')}" style="color:var(--accent);margin-top:16px;display:inline-block">← Retour</a>`
    })
  </script>
</body>
</html>
