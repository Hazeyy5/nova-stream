<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Stream — Widget overlay</title>
  <script>
    (function () {
      var path = location.pathname
      var overlayIdx = path.indexOf('/overlays/')
      window.OVERLAY_ASSET_BASE = overlayIdx >= 0 ? path.slice(0, overlayIdx) : ''
      ;['/css/style.css', '/css/dashboard.css'].forEach(function (href) {
        var link = document.createElement('link')
        link.rel = 'stylesheet'
        link.href = window.OVERLAY_ASSET_BASE + href
        document.head.appendChild(link)
      })
    })()
  </script>
  <style>
    html, body {
      margin: 0;
      min-height: 100vh;
      background: transparent;
      overflow: hidden;
    }
    .overlay-root {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="overlay-root" id="overlay-root"></div>
  <script>
    window.OVERLAY_WIDGET = '__WIDGET_ID__'
    window.OVERLAY_TOKEN = '__WIDGET_TOKEN__'
    window.OVERLAY_DESKTOP = 'http://127.0.0.1:3847'
  </script>
  <script>
    (function () {
      var base = window.OVERLAY_ASSET_BASE || ''
      var scripts = [
        '/js/config.js',
        '/js/twitch-live-stats.js',
        '/js/alert-sounds.js',
        '/js/overlay-runtime.js'
      ]
      var i = 0
      function loadNext() {
        if (i >= scripts.length) return
        var s = document.createElement('script')
        s.src = base + scripts[i++]
        s.onload = loadNext
        s.onerror = loadNext
        document.body.appendChild(s)
      }
      loadNext()
    })()
  </script>
</body>
</html>
