<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Envoyer un don — Nova Stream</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/donations.css" />
</head>
<body>
  <div class="tip-page">
    <div class="tip-card" id="tip-root">
      <p style="text-align:center;color:#94a3b8">Chargement...</p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/donations.js"></script>
  <script src="js/giphy-picker.js"></script>
  <script>
    const params = new URLSearchParams(location.search)
    const username = (params.get('u') || params.get('user') || '').trim().toLowerCase()
    const root = document.getElementById('tip-root')
    let streamerState = null
    let paypalSdkLoaded = false
    let giphyPicker = null
    window.__tipSelectedGifUrl = ''

    if (!username) {
      root.innerHTML = '<p class="tip-error">Chaîne non spécifiée. Utilisez ?u=votre_pseudo</p>'
    } else if (!NovaDonations.apiUrl()) {
      root.innerHTML = '<p class="tip-error">Les dons ne sont pas encore activés sur cette instance Nova Stream.</p>'
    } else if (params.get('paid') === '1') {
      root.innerHTML = `
        <div class="tip-success">
          <h2>✓ Paiement reçu !</h2>
          <p>Merci pour votre soutien — l'alerte apparaîtra sur le stream.</p>
        </div>
      `
    } else {
      void loadTipPage(username)
    }

    async function loadTipPage(user) {
      try {
        const streamer = await NovaDonations.fetchStreamer(user)
        streamerState = streamer
        renderForm(streamer)
        if (streamer.paypalConnected) {
          await setupPayPalButtons(streamer)
        }
      } catch (err) {
        root.innerHTML = `<p class="tip-error">${escapeHtml(err.message)}</p>`
      }
    }

    function renderForm(s) {
      const sym = s.currency === 'USD' ? '$' : '€'
      const title = s.pageTitle || `Soutenir ${s.displayName}`
      const amounts = s.suggestedAmounts?.length ? s.suggestedAmounts : [1, 3, 5, 10, 20]
      let selected = amounts[Math.min(2, amounts.length - 1)] ?? 5
      window.__tipSelectedAmount = selected

      const payBlock = s.paypalConnected
        ? `<div id="paypal-button-container" class="tip-paypal-wrap"></div>
           <p class="tip-powered tip-pay-hint">Paiement sécurisé PayPal — l'alerte apparaît après confirmation.</p>`
        : `<p class="tip-error">Ce streamer n'a pas encore connecté PayPal. Les dons ne sont pas disponibles pour le moment.</p>`

      root.innerHTML = `
        <div id="tip-form-view">
          <div class="tip-header">
            ${s.avatarUrl ? `<img class="tip-avatar" src="${s.avatarUrl}" alt="" />` : ''}
            <h1>${escapeHtml(title)}</h1>
            <p>${escapeHtml(s.pageMessage || `Envoyez un don à ${s.displayName}`)}</p>
          </div>
          <div id="tip-error" class="tip-error" style="display:none"></div>
          <div class="tip-amounts" id="tip-amounts">
            ${amounts.map((a) => `
              <button type="button" class="tip-amount-btn${a === selected ? ' active' : ''}" data-amount="${a}">
                ${a}${sym}
              </button>
            `).join('')}
          </div>
          <div class="tip-field">
            <label for="tip-custom">Montant personnalisé (${sym})</label>
            <input type="number" id="tip-custom" min="${s.minAmount}" step="1" placeholder="Min. ${s.minAmount}${sym}" />
          </div>
          <div class="tip-field">
            <label for="tip-name">Votre pseudo</label>
            <input type="text" id="tip-name" maxlength="40" placeholder="Anonyme" />
          </div>
          <div class="tip-field">
            <label for="tip-msg">Message (optionnel)</label>
            <textarea id="tip-msg" maxlength="280" placeholder="${escapeHtml(s.thankYouMessage || 'Laissez un message au streamer…')}"></textarea>
          </div>
          <div class="tip-giphy-wrap" id="tip-giphy-wrap" hidden>
            <p class="tip-giphy-heading" id="tip-giphy-heading">Ajouter un GIF Giphy</p>
            <p class="tip-giphy-hint">Disponible à partir de ${s.donationGifMinAmount ?? 25}${sym} — le GIF apparaîtra sur l'alerte live.</p>
            <div id="tip-giphy-mount"></div>
          </div>
          ${payBlock}
          <p class="tip-powered">Propulsé par <a href="${window.NOVA_CONFIG.WEBSITE_URL}">Nova Stream</a></p>
        </div>
      `

      const amountBtns = root.querySelectorAll('.tip-amount-btn')
      const customInput = document.getElementById('tip-custom')

      function currentAmount() {
        const custom = parseFloat(customInput?.value)
        if (Number.isFinite(custom) && custom >= s.minAmount) return custom
        return window.__tipSelectedAmount ?? selected
      }

      window.__tipCurrentAmount = currentAmount

      amountBtns.forEach((btn) => {
        btn.onclick = () => {
          window.__tipSelectedAmount = parseFloat(btn.dataset.amount)
          amountBtns.forEach((b) => b.classList.toggle('active', b === btn))
          if (customInput) customInput.value = ''
        }
      })

      setupGiphySection(s, amountBtns, customInput)
    }

    function getTipGifPayload(s) {
      const min = s?.donationGifMinAmount ?? 25
      const amount = window.__tipCurrentAmount()
      if (amount < min) return ''
      return window.__tipSelectedGifUrl || giphyPicker?.getSelected?.() || ''
    }

    function setupGiphySection(s, amountBtns, customInput) {
      const wrap = document.getElementById('tip-giphy-wrap')
      const mount = document.getElementById('tip-giphy-mount')
      if (!wrap || !mount || !s.giphyConfigured || s.donationGifEnabled === false || !window.NovaGiphyPicker) {
        if (wrap) wrap.hidden = true
        return
      }

      const min = s.donationGifMinAmount ?? 25
      const sym = s.currency === 'USD' ? '$' : '€'
      const heading = document.getElementById('tip-giphy-heading')
      if (heading) heading.textContent = `Ajouter un GIF Giphy (≥ ${min}${sym})`

      giphyPicker = NovaGiphyPicker.mount(mount, {
        onChange: (url) => { window.__tipSelectedGifUrl = url }
      })

      function updateVisibility() {
        const show = window.__tipCurrentAmount() >= min
        wrap.hidden = !show
        if (!show) {
          window.__tipSelectedGifUrl = ''
          giphyPicker?.clear?.()
        }
      }

      amountBtns.forEach((btn) => btn.addEventListener('click', updateVisibility))
      customInput?.addEventListener('input', updateVisibility)
      updateVisibility()
    }

    async function setupPayPalButtons(s) {
      const config = await NovaDonations.fetchPayPalConfig()
      if (!config.clientId) return

      await loadPayPalSdk(config.clientId, s.currency, config.mode)
      const container = document.getElementById('paypal-button-container')
      if (!container || !window.paypal) return

      window.paypal.Buttons({
        style: { layout: 'vertical', color: 'gold', shape: 'rect', label: 'paypal' },
        createOrder: async () => {
          const amount = window.__tipCurrentAmount()
          if (amount < s.minAmount) {
            throw new Error(`Montant minimum : ${s.minAmount}`)
          }
          const order = await NovaDonations.createPayPalOrder({
            streamerId: s.streamerId,
            donorName: document.getElementById('tip-name')?.value.trim() || 'Anonyme',
            message: document.getElementById('tip-msg')?.value.trim() || '',
            amount,
            currency: s.currency,
            alertGifUrl: getTipGifPayload(s),
            returnUrl: location.href.split('?')[0] + '?paid=1',
            cancelUrl: location.href
          })
          window.__tipDonationId = order.donationId
          return order.orderId
        },
        onApprove: async (data) => {
          const result = await NovaDonations.capturePayPalOrder({
            streamerId: s.streamerId,
            orderId: data.orderID,
            donationId: window.__tipDonationId || ''
          })
          root.innerHTML = `
            <div class="tip-success">
              <h2>✓ Paiement confirmé !</h2>
              <p>${escapeHtml(result.thankYouMessage || s.thankYouMessage || 'Merci pour votre soutien !')}</p>
              <p style="color:#94a3b8;margin-top:12px">L'alerte va apparaître sur le stream de ${escapeHtml(s.displayName)}.</p>
            </div>
          `
        },
        onError: (err) => {
          const errEl = document.getElementById('tip-error')
          if (errEl) {
            errEl.textContent = err?.message || 'Erreur PayPal'
            errEl.style.display = 'block'
          }
        }
      }).render('#paypal-button-container')
    }

    function loadPayPalSdk(clientId, currency, mode) {
      if (paypalSdkLoaded && window.paypal) return Promise.resolve()
      const host = mode === 'live' ? 'https://www.paypal.com' : 'https://www.sandbox.paypal.com'
      return new Promise((resolve, reject) => {
        const script = document.createElement('script')
        script.src = `${host}/sdk/js?client-id=${encodeURIComponent(clientId)}&currency=${encodeURIComponent(currency || 'EUR')}&intent=capture`
        script.onload = () => {
          paypalSdkLoaded = true
          resolve()
        }
        script.onerror = () => reject(new Error('SDK PayPal indisponible'))
        document.head.appendChild(script)
      })
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
    }
  </script>
</body>
</html>
