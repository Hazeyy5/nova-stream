appId: com.novastream.app
productName: Nova Stream
copyright: Copyright © 2026 Nova Stream

directories:
  output: release

files:
  - out/**/*
  - package.json

extraResources:
  - from: shared/platform.json
    to: shared/platform.json
  - from: docs/overlays
    to: docs/overlays
  - from: docs/css
    to: docs/css
  - from: docs/js/overlay-runtime.js
    to: docs/js/overlay-runtime.js

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerLanguages:
    - fr
    - en

publish:
  provider: github
  owner: Hazeyy5
  repo: nova-stream
